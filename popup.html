<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FullSnap</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0b;
      --surface: #111113;
      --border: #222226;
      --accent: #e8ff47;
      --accent-dim: #c8df27;
      --text: #f0f0f0;
      --text-muted: #666670;
      --danger: #ff4747;
      --success: #47ff8a;
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      user-select: none;
    }

    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .tagline {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .content {
      padding: 16px 20px 20px;
    }

    .page-info {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .page-info-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .page-title {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .option-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .option-value {
      font-size: 10px;
      color: var(--accent);
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 14px;
    }

    .capture-btn {
      width: 100%;
      padding: 13px 0;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #0a0a0b;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .capture-btn:hover:not(:disabled) {
      background: var(--accent-dim);
    }

    .capture-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .capture-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .capture-btn.loading {
      background: var(--border);
      color: var(--text-muted);
    }

    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      width: 0%;
      transition: width 0.2s ease;
      border-radius: 0 0 8px 8px;
    }

    .status {
      margin-top: 10px;
      font-size: 10px;
      text-align: center;
      min-height: 16px;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .status.success { color: var(--success); }
    .status.error   { color: var(--danger); }
    .status.working { color: var(--accent); }

    .stats-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .stat-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      display: block;
    }

    .stat-label {
      font-size: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-top: 2px;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="4" width="16" height="11" rx="2" fill="#0a0a0b"/>
        <circle cx="9" cy="9.5" r="3" fill="#0a0a0b" stroke="#0a0a0b" stroke-width="1.5"/>
        <circle cx="9" cy="9.5" r="1.5" fill="#0a0a0b"/>
        <path d="M6 4L7.5 2h3L12 4" stroke="#0a0a0b" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="9" cy="9.5" r="3" stroke="#e8ff47" stroke-width="1.2"/>
        <circle cx="9" cy="9.5" r="1.2" fill="#e8ff47"/>
        <rect x="1" y="4" width="16" height="11" rx="2" stroke="#0a0a0b" stroke-width="1.2"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Full<span>Snap</span></div>
      <div class="tagline">Full-page • Lossless PNG</div>
    </div>
  </div>

  <div class="content">
    <div class="page-info">
      <div class="page-info-label">Active page</div>
      <div class="page-title" id="pageTitle">Loading...</div>
    </div>

    <div class="options">
      <div class="option-row">
        <span class="option-label">Format</span>
        <span class="option-value">PNG (lossless)</span>
      </div>
      <div class="option-row">
        <span class="option-label">Quality</span>
        <span class="option-value">Max · No compression</span>
      </div>
      <div class="option-row">
        <span class="option-label">Capture</span>
        <span class="option-value">Full page · All content</span>
      </div>
    </div>

    <div class="divider"></div>

    <button class="capture-btn" id="captureBtn">
      📸 &nbsp;Capture Full Page
      <div class="progress-bar" id="progressBar"></div>
    </button>

    <div class="status" id="status"></div>

    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-box">
        <span class="stat-num" id="statW">—</span>
        <span class="stat-label">Width px</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="statH">—</span>
        <span class="stat-label">Height px</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="statSize">—</span>
        <span class="stat-label">File size</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
